# Google Cloud Build configuration for Trade App
# Builds the Docker image and deploys to Cloud Run

steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/trade-app:$SHORT_SHA",
        "-t",
        "gcr.io/$PROJECT_ID/trade-app:latest",
        "--build-arg",
        "NEXT_PUBLIC_BACKEND_URL=${_NEXT_PUBLIC_BACKEND_URL}",
        "--build-arg",
        "NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}",
        "--build-arg",
        "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}",
        "--build-arg",
        "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}",
        ".",
      ]

  # Push the image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/trade-app:$SHORT_SHA"]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/trade-app:latest"]

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "trade-app"
      - "--image"
      - "gcr.io/$PROJECT_ID/trade-app:$SHORT_SHA"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "3"
      - "--set-env-vars"
      - "NODE_ENV=production,TWELVE_DATA_API_KEY=${_TWELVE_DATA_API_KEY},ANTHROPIC_API_KEY=${_ANTHROPIC_API_KEY},BACKEND_URL=${_BACKEND_URL}"
      - "--execution-environment"
      - "gen2"

substitutions:
  _REGION: us-central1
  _TWELVE_DATA_API_KEY: ""
  _ANTHROPIC_API_KEY: ""
  _BACKEND_URL: "https://trade-backend-685436576212.us-central1.run.app"
  _NEXT_PUBLIC_BACKEND_URL: "https://trade-backend-685436576212.us-central1.run.app"
  _NEXT_PUBLIC_FIREBASE_API_KEY: ""
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ""
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: ""

images:
  - "gcr.io/$PROJECT_ID/trade-app:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/trade-app:latest"

options:
  logging: CLOUD_LOGGING_ONLY
